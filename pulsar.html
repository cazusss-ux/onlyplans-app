<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Puls</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
.hint {
  position: fixed; top: 48px; width: 100%; text-align: center;
  font-family: -apple-system, sans-serif; font-size: 11px;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(255,255,255,0.15); z-index: 10; pointer-events: none;
}
.status {
  position: fixed; bottom: 56px; width: 100%; text-align: center;
  font-family: -apple-system, sans-serif; font-size: 13px;
  color: rgba(255,255,255,0.25); z-index: 10; pointer-events: none;
  transition: color 0.5s; padding: 0 40px; line-height: 1.5;
}
.status.active { color: rgba(255,200,120,0.7); }
.back {
  position: fixed; top: 14px; left: 14px;
  font-family: -apple-system, sans-serif; font-size: 12px;
  color: rgba(255,255,255,0.15); cursor: pointer; z-index: 20;
}
</style>
</head>
<body>
<div class="back" onclick="history.back()">← назад</div>
<div class="hint">Задай вопрос Пульсару</div>
<canvas id="c"></canvas>
<div class="status" id="status">Напиши вопрос боту в чате</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H, cx, cy, R;
let t = 0;
let thinking = false;
let thinkTimer = null;

function resize() {
  W = cv.width = window.innerWidth;
  H = cv.height = window.innerHeight;
  cx = W * 0.46;
  cy = H * 0.48;
  R = Math.min(W, H) * 0.24;
}
resize();
window.addEventListener('resize', resize);

// Звёзды
const stars = Array.from({length: 200}, () => ({
  x: Math.random(), y: Math.random(),
  r: 0.2 + Math.random() * 0.8,
  a: 0.08 + Math.random() * 0.4,
  f: 0.2 + Math.random() * 1.2
}));

// ECG — реалистичный QRS
function ecgSample(phase) {
  const p = ((phase % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const norm = p / (Math.PI * 2);
  // P wave
  const pw = Math.exp(-Math.pow((norm - 0.1) * 22, 2)) * 0.18;
  // Q dip
  const q  = -Math.exp(-Math.pow((norm - 0.22) * 45, 2)) * 0.15;
  // R spike
  const r  =  Math.exp(-Math.pow((norm - 0.27) * 28, 2)) * 1.0;
  // S dip
  const s  = -Math.exp(-Math.pow((norm - 0.32) * 42, 2)) * 0.22;
  // T wave
  const tw =  Math.exp(-Math.pow((norm - 0.55) * 14, 2)) * 0.28;
  return pw + q + r + s + tw;
}

let ecgOffset = 0;
let dotPos = 0;

// Параметры диска (наклонный эллипс)
const DISK_A = 2.8;   // горизонтальный радиус диска (множитель R)
const DISK_B = 0.55;  // вертикальный (наклон)
const DISK_TILT = -0.18; // наклон в радианах

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Фон — глубокий космос
  ctx.fillStyle = '#02010a';
  ctx.fillRect(0, 0, W, H);

  // Звёзды
  stars.forEach((s, i) => {
    const a = s.a * (0.6 + Math.sin(t * s.f + i * 1.7) * 0.4);
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  });

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(DISK_TILT);

  // === ЗАДНЯЯ ЧАСТЬ ДИСКА (за горизонтом) ===
  for (let i = 12; i >= 0; i--) {
    const rInner = R * (1.05 + i * 0.12);
    const rOuter = rInner + R * 0.14;
    const scaleY = DISK_B * (1 - i * 0.012);
    const alpha = Math.max(0, 0.38 - i * 0.028) * (thinking ? 1.3 : 1);
    const hue = 28 + i * 3;
    const sat = 70 + i * 2;

    ctx.save();
    ctx.scale(1, scaleY);
    const g = ctx.createRadialGradient(0, 0, rInner, 0, 0, rOuter);
    g.addColorStop(0, `hsla(${hue},${sat}%,72%,${alpha})`);
    g.addColorStop(0.5, `hsla(${hue+10},${sat-10}%,55%,${alpha * 0.6})`);
    g.addColorStop(1, `hsla(${hue},50%,30%,0)`);
    ctx.beginPath();
    ctx.arc(0, 0, rOuter, Math.PI, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }

  // Несколько ярких полос диска (задний план)
  for (let i = 0; i < 5; i++) {
    const r = R * (1.08 + i * 0.28);
    const alpha = (0.22 - i * 0.04) * (thinking ? 1.4 : 1);
    ctx.save();
    ctx.scale(1, DISK_B * 0.95);
    ctx.beginPath();
    ctx.arc(0, 0, r, Math.PI, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,210,130,${alpha})`;
    ctx.lineWidth = R * 0.025;
    ctx.stroke();
    ctx.restore();
  }

  // === ЧЁРНАЯ СФЕРА ===
  // Мягкое свечение вокруг сферы
  const sphereGlow = ctx.createRadialGradient(0, -R * 0.1, R * 0.7, 0, 0, R * 1.3);
  sphereGlow.addColorStop(0, 'rgba(0,0,0,0)');
  sphereGlow.addColorStop(0.55, 'rgba(0,0,0,0)');
  sphereGlow.addColorStop(0.75, 'rgba(255,200,100,0.06)');
  sphereGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(0, 0, R * 1.3, 0, Math.PI * 2);
  ctx.fillStyle = sphereGlow;
  ctx.fill();

  // Сама чёрная сфера
  const blackHole = ctx.createRadialGradient(R * 0.15, -R * 0.15, 0, 0, 0, R);
  blackHole.addColorStop(0, '#0a0808');
  blackHole.addColorStop(0.5, '#050303');
  blackHole.addColorStop(1, '#000000');
  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI * 2);
  ctx.fillStyle = blackHole;
  ctx.fill();

  // Белое фотонное кольцо
  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,240,0.85)';
  ctx.lineWidth = R * 0.025;
  ctx.shadowBlur = 12;
  ctx.shadowColor = 'rgba(255,250,220,0.6)';
  ctx.stroke();
  ctx.shadowBlur = 0;

  // === ПУЛЬС ВНУТРИ СФЕРЫ ===
  ctx.save();
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.86, 0, Math.PI * 2);
  ctx.clip();

  const ecgW = R * 1.6;
  const ecgH = R * 0.55;
  const speed = thinking ? 0.22 : 0.07;
  ecgOffset += speed;
  dotPos = (dotPos + speed * 0.55) % (Math.PI * 2);

  // Сетка (слабая)
  ctx.strokeStyle = 'rgba(150,30,30,0.08)';
  ctx.lineWidth = 0.5;
  for (let xi = -3; xi <= 3; xi++) {
    ctx.beginPath();
    ctx.moveTo(xi * R * 0.3, -R * 0.8);
    ctx.lineTo(xi * R * 0.3, R * 0.8);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(-ecgW * 0.6, 0);
  ctx.lineTo(ecgW * 0.6, 0);
  ctx.stroke();

  // Основная линия ECG
  const pts = [];
  const steps = 200;
  for (let xi = 0; xi <= steps; xi++) {
    const xn = xi / steps;
    const fade = Math.sin(xn * Math.PI);
    const phase = xn * Math.PI * 4 + ecgOffset;
    const yval = ecgSample(phase) * ecgH * fade;
    const px = -ecgW / 2 + xn * ecgW;
    const py = -yval;
    pts.push([px, py]);
  }

  // Свечение (широкое)
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  pts.forEach(([px, py]) => ctx.lineTo(px, py));
  ctx.strokeStyle = thinking
    ? 'rgba(255,80,80,0.25)'
    : 'rgba(200,40,40,0.18)';
  ctx.lineWidth = thinking ? 7 : 5;
  ctx.shadowBlur = 0;
  ctx.stroke();

  // Основная линия
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  pts.forEach(([px, py]) => ctx.lineTo(px, py));
  ctx.strokeStyle = thinking
    ? `rgba(255,${90 + Math.sin(t * 8) * 40},90,0.95)`
    : 'rgba(220,50,50,0.9)';
  ctx.lineWidth = thinking ? 2.2 : 1.6;
  ctx.shadowBlur = thinking ? 16 : 8;
  ctx.shadowColor = thinking ? 'rgba(255,80,80,0.9)' : 'rgba(220,50,50,0.7)';
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Движущаяся точка
  const dotNorm = (dotPos / (Math.PI * 2)) % 1;
  const dotIdx = Math.floor(dotNorm * steps);
  if (dotIdx < pts.length) {
    const [dx, dy] = pts[dotIdx];
    ctx.beginPath();
    ctx.arc(dx, dy, thinking ? 3.5 : 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,180,60,1)';
    ctx.shadowBlur = 14;
    ctx.shadowColor = 'rgba(255,160,40,0.9)';
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.restore();

  // === ПЕРЕДНЯЯ ЧАСТЬ ДИСКА (перед горизонтом) ===
  for (let i = 0; i < 12; i++) {
    const rInner = R * (1.05 + i * 0.13);
    const rOuter = rInner + R * 0.15;
    const scaleY = DISK_B * (1 - i * 0.01);
    const alpha = Math.max(0, 0.55 - i * 0.04) * (thinking ? 1.25 : 1);
    const hue = 25 + i * 2.5;

    ctx.save();
    ctx.scale(1, scaleY);
    const g = ctx.createRadialGradient(0, 0, rInner, 0, 0, rOuter);
    g.addColorStop(0, `hsla(${hue},85%,80%,${alpha})`);
    g.addColorStop(0.4, `hsla(${hue+8},78%,60%,${alpha * 0.65})`);
    g.addColorStop(1, `hsla(${hue+5},55%,28%,0)`);
    ctx.beginPath();
    ctx.arc(0, 0, rOuter, 0, Math.PI);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }

  // Яркие полосы переднего диска
  for (let i = 0; i < 6; i++) {
    const r = R * (1.1 + i * 0.25);
    const alpha = (0.45 - i * 0.07) * (thinking ? 1.4 : 1);
    ctx.save();
    ctx.scale(1, DISK_B * 0.92);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI);
    ctx.strokeStyle = `rgba(255,${200 - i * 15},${100 - i * 10},${alpha})`;
    ctx.lineWidth = R * (0.03 - i * 0.003);
    ctx.shadowBlur = 8;
    ctx.shadowColor = `rgba(255,180,80,${alpha * 0.5})`;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  ctx.restore(); // rotate

  t += 0.008;
  requestAnimationFrame(draw);
}
draw();

// Тап
cv.addEventListener('click', e => {
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  if (Math.sqrt(dx*dx + dy*dy) < R * 1.3) {
    thinking = true;
    setStatus('active', 'Напиши вопрос боту в чате — Пульсар думает...');
    if (thinkTimer) clearTimeout(thinkTimer);
    thinkTimer = setTimeout(() => {
      thinking = false;
      setStatus('', 'Напиши вопрос боту в чате');
    }, 4000);
  }
});

function setStatus(cls, text) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status ' + cls;
}
</script>
</body>
</html>
