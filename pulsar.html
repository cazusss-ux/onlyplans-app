<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Puls</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
.hint {
  position: fixed; bottom: 64px; width: 100%; text-align: center;
  font-family: -apple-system, sans-serif; font-size: 11px;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(255,255,255,0.13); z-index: 10; pointer-events: none;
  transition: color 0.6s;
}
.hint.active { color: rgba(255,180,80,0.45); }
.back {
  position: fixed; top: 14px; left: 14px;
  font-family: -apple-system, sans-serif; font-size: 12px;
  color: rgba(255,255,255,0.13); cursor: pointer; z-index: 20;
}
</style>
</head>
<body>
<div class="back" onclick="history.back()">← назад</div>
<canvas id="c"></canvas>
<div class="hint" id="hint">Коснись Пульсара</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H, cx, cy, R;

function resize() {
  W = cv.width = window.innerWidth;
  H = cv.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  R = Math.min(W, H) * 0.22;
}
resize();
window.addEventListener('resize', resize);

// Состояния: idle → touched → thinking → answering → idle
let state = 'idle';
let t = 0;
let intensity = 0;       // 0..1 накал
let targetIntensity = 0;
let ripples = [];
let flashAlpha = 0;
let thinkTimer = null;

// Звёзды — редкие, почти невидимые
const stars = Array.from({length: 60}, () => ({
  x: Math.random(), y: Math.random(),
  r: 0.2 + Math.random() * 0.6,
  a: 0.04 + Math.random() * 0.12,
  f: 0.3 + Math.random() * 0.8
}));

function setState(s) {
  state = s;
  const hint = document.getElementById('hint');
  if (s === 'idle') {
    targetIntensity = 0;
    hint.textContent = 'Коснись Пульсара';
    hint.className = 'hint';
  } else if (s === 'touched') {
    targetIntensity = 0.5;
    hint.textContent = 'Напиши вопрос в чате';
    hint.className = 'hint active';
  } else if (s === 'thinking') {
    targetIntensity = 0.85;
    hint.textContent = 'Думает...';
    hint.className = 'hint active';
  } else if (s === 'answering') {
    targetIntensity = 1.0;
    flashAlpha = 1.0;
    hint.textContent = 'Смотри ответ в чате';
    hint.className = 'hint active';
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Фон
  ctx.fillStyle = '#000008';
  ctx.fillRect(0, 0, W, H);

  // Звёзды
  stars.forEach((s, i) => {
    const a = s.a * (0.5 + Math.sin(t * s.f + i) * 0.5);
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  });

  // Плавный переход intensity
  intensity += (targetIntensity - intensity) * 0.035;

  // Дыхание в покое
  const breath = Math.sin(t * 1.1) * 0.5 + 0.5; // 0..1
  const breathIntensity = intensity + (state === 'idle' ? breath * 0.12 : 0);

  // Внешнее рассеянное свечение
  if (breathIntensity > 0.01) {
    const glowR = R * (2.8 + breathIntensity * 1.5);
    const glow = ctx.createRadialGradient(cx, cy, R * 0.5, cx, cy, glowR);
    const alpha1 = breathIntensity * 0.12;
    const alpha2 = breathIntensity * 0.04;
    glow.addColorStop(0,   `rgba(255,${140 - breathIntensity*40},${20},${alpha1})`);
    glow.addColorStop(0.4, `rgba(200,${80},0,${alpha2})`);
    glow.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }

  // Рябь от касания
  ripples = ripples.filter(r => r.alpha > 0.005);
  ripples.forEach(r => {
    r.radius += 3.5;
    r.alpha *= 0.93;
    ctx.beginPath();
    ctx.arc(cx, cy, r.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,160,60,${r.alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Шар — тёмное ядро
  const ballGrad = ctx.createRadialGradient(
    cx - R * 0.25, cy - R * 0.25, 0,
    cx, cy, R
  );

  // Накал: от тёмного угля к раскалённому
  const heat = breathIntensity;
  const r1 = Math.floor(10 + heat * 30);
  const g1 = Math.floor(5 + heat * 10);
  const b1 = Math.floor(5 + heat * 3);
  const r2 = Math.floor(heat * 255);
  const g2 = Math.floor(heat * 80);
  const edgeAlpha = 0.15 + heat * 0.6;

  ballGrad.addColorStop(0,   `rgb(${r1},${g1},${b1})`);
  ballGrad.addColorStop(0.45, `rgb(${Math.floor(r1*0.6)},${Math.floor(g1*0.5)},${Math.floor(b1*0.5)})`);
  ballGrad.addColorStop(0.78, `rgb(${Math.floor(heat*60)},${Math.floor(heat*15)},0)`);
  ballGrad.addColorStop(1,   `rgba(${r2},${g2},0,${edgeAlpha})`);

  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = ballGrad;
  ctx.fill();

  // Внутренняя текстура накала (трещины угля)
  if (heat > 0.1) {
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2 + t * 0.2;
      const len = R * (0.2 + Math.sin(t * 0.7 + i) * 0.1);
      const ox = cx + Math.cos(angle) * R * 0.25;
      const oy = cy + Math.sin(angle) * R * 0.25;
      const ex = ox + Math.cos(angle + 0.8) * len;
      const ey = oy + Math.sin(angle + 0.8) * len;
      const crackAlpha = heat * (0.3 + Math.sin(t * 2 + i) * 0.2);
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(ex, ey);
      ctx.strokeStyle = `rgba(255,${120 + i*10},${20},${crackAlpha})`;
      ctx.lineWidth = heat * 1.5;
      ctx.stroke();
    }
  }

  // Ободок — светящийся край
  const edgeGrad = ctx.createRadialGradient(cx, cy, R * 0.82, cx, cy, R * 1.02);
  edgeGrad.addColorStop(0, 'rgba(0,0,0,0)');
  edgeGrad.addColorStop(0.6, `rgba(255,${Math.floor(100 * heat)},0,${heat * 0.5})`);
  edgeGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, R * 1.02, 0, Math.PI * 2);
  ctx.fillStyle = edgeGrad;
  ctx.fill();

  // Пульс — шар слегка меняет размер в ритме
  const pulseScale = 1 + Math.sin(t * (state === 'thinking' ? 6 : 1.8)) * (0.012 + heat * 0.025);
  if (Math.abs(pulseScale - 1) > 0.001) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(pulseScale, pulseScale);
    ctx.translate(-cx, -cy);
    // Дополнительный ореол в момент пульса
    const pulseGlow = ctx.createRadialGradient(cx, cy, R * 0.9, cx, cy, R * 1.15);
    const pa = Math.abs(pulseScale - 1) * 20 * heat;
    pulseGlow.addColorStop(0, `rgba(255,120,0,${pa})`);
    pulseGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, R * 1.15, 0, Math.PI * 2);
    ctx.fillStyle = pulseGlow;
    ctx.fill();
    ctx.restore();
  }

  // Вспышка при ответе
  if (flashAlpha > 0.01) {
    const flashGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 2.5);
    flashGrad.addColorStop(0, `rgba(255,200,100,${flashAlpha * 0.9})`);
    flashGrad.addColorStop(0.3, `rgba(255,120,30,${flashAlpha * 0.4})`);
    flashGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, R * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = flashGrad;
    ctx.fill();
    flashAlpha *= 0.88;
  }

  t += 0.012;
  requestAnimationFrame(draw);
}
draw();

// Касание
cv.addEventListener('click', e => {
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < R * 1.4) {
    // Рябь
    ripples.push({ radius: R * 0.3, alpha: 0.6 });

    if (state === 'idle') {
      setState('touched');
      if (thinkTimer) clearTimeout(thinkTimer);
      thinkTimer = setTimeout(() => {
        setState('thinking');
        thinkTimer = setTimeout(() => {
          setState('answering');
          thinkTimer = setTimeout(() => setState('idle'), 2500);
        }, 3000);
      }, 1200);
    }
  }
});

// Долгое нажатие — режим "думает"
let pressTimer = null;
cv.addEventListener('touchstart', e => {
  const touch = e.touches[0];
  const dx = touch.clientX - cx;
  const dy = touch.clientY - cy;
  if (Math.sqrt(dx*dx + dy*dy) < R * 1.4) {
    ripples.push({ radius: R * 0.2, alpha: 0.5 });
    pressTimer = setTimeout(() => {
      setState('thinking');
    }, 500);
  }
}, { passive: true });

cv.addEventListener('touchend', () => {
  if (pressTimer) clearTimeout(pressTimer);
}, { passive: true });
</script>
</body>
</html>
