<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Puls</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
}
canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
}
.hint {
  position: fixed;
  top: 52px;
  width: 100%;
  text-align: center;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.18);
  z-index: 10;
  pointer-events: none;
}
.status {
  position: fixed;
  bottom: 60px;
  width: 100%;
  text-align: center;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 13px;
  color: rgba(255,255,255,0.3);
  z-index: 10;
  pointer-events: none;
  transition: color 0.5s;
  padding: 0 32px;
}
.status.answer { color: rgba(255,255,255,0.7); }
.back {
  position: fixed;
  top: 16px; left: 16px;
  font-family: -apple-system, sans-serif;
  font-size: 12px;
  color: rgba(255,255,255,0.18);
  cursor: pointer;
  z-index: 20;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
<div class="back" onclick="history.back()">← назад</div>
<div class="hint">Задай вопрос Пульсару</div>
<canvas id="c"></canvas>
<div class="status" id="status">Напиши вопрос боту в чате</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, R;
let t = 0;
let thinking = false;
let thinkPulse = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  R = Math.min(W, H) * 0.28;
}
resize();
window.addEventListener('resize', resize);

// Звёзды
const stars = Array.from({length: 180}, (_, i) => ({
  x: Math.random(),
  y: Math.random(),
  r: 0.3 + Math.random() * 0.9,
  a: 0.15 + Math.random() * 0.5,
  speed: 0.3 + Math.random() * 0.7
}));

// Кардиограмма — реалистичный QRS-комплекс
function ecgY(x, phase, amp) {
  const p = ((x * 0.06 + phase) % (Math.PI * 2));
  const base = Math.sin(p * 0.5) * 0.08;
  // P-wave
  const pw = Math.exp(-Math.pow((p - 0.8) * 6, 2)) * 0.15;
  // QRS
  const q  = -Math.exp(-Math.pow((p - 1.6) * 20, 2)) * 0.12;
  const r  =  Math.exp(-Math.pow((p - 1.75) * 14, 2)) * 1.0;
  const s  = -Math.exp(-Math.pow((p - 1.9) * 18, 2)) * 0.18;
  // T-wave
  const tw =  Math.exp(-Math.pow((p - 2.6) * 5, 2)) * 0.22;
  return (base + pw + q + r + s + tw) * amp;
}

let ecgPhase = 0;

function drawFrame() {
  ctx.clearRect(0, 0, W, H);

  // Фон
  ctx.fillStyle = '#000005';
  ctx.fillRect(0, 0, W, H);

  // Звёзды
  stars.forEach((s, i) => {
    const flicker = 0.5 + Math.sin(t * s.speed + i) * 0.5;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a * flicker})`;
    ctx.fill();
  });

  // === ГАРГАНТЮА ===

  // Внешнее диффузное свечение (гравитационное линзирование)
  const outerR = R * 3.2;
  const outerGlow = ctx.createRadialGradient(cx, cy, R * 0.9, cx, cy, outerR);
  outerGlow.addColorStop(0,   'rgba(200,170,120,0.0)');
  outerGlow.addColorStop(0.15,'rgba(180,140,90,0.04)');
  outerGlow.addColorStop(0.35,'rgba(150,120,80,0.06)');
  outerGlow.addColorStop(0.6, 'rgba(100,80,60,0.03)');
  outerGlow.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = outerGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
  ctx.fill();

  // Аккреционный диск — верхняя дуга (линзирование снизу вверх)
  // Гаргантюа выглядит как: яркое кольцо сверху, горизонтальный диск, яркая дуга снизу
  // Верхняя дуга (отражённый диск)
  for (let pass = 0; pass < 3; pass++) {
    const scale = 1 - pass * 0.06;
    const alpha = [0.55, 0.3, 0.15][pass];
    const thick = [R * 0.22, R * 0.14, R * 0.08][pass];

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1, 0.38 * scale);

    const arcGrad = ctx.createRadialGradient(0, 0, R * 0.88, 0, 0, R * 1.18);
    arcGrad.addColorStop(0,   `rgba(255,240,200,${alpha})`);
    arcGrad.addColorStop(0.4, `rgba(255,210,140,${alpha * 0.7})`);
    arcGrad.addColorStop(0.8, `rgba(200,160,100,${alpha * 0.3})`);
    arcGrad.addColorStop(1,   'rgba(0,0,0,0)');

    ctx.beginPath();
    ctx.arc(0, 0, R * 1.18, Math.PI, Math.PI * 2);
    ctx.lineWidth = thick;
    ctx.strokeStyle = arcGrad;
    ctx.stroke();
    ctx.restore();
  }

  // Горизонтальный джет (диск сбоку)
  const jetW = R * 3.8;
  const jetH = R * 0.11;
  const jetGrad = ctx.createLinearGradient(cx - jetW, cy, cx + jetW, cy);
  jetGrad.addColorStop(0,    'rgba(0,0,0,0)');
  jetGrad.addColorStop(0.15, 'rgba(160,120,70,0.12)');
  jetGrad.addColorStop(0.35, 'rgba(220,180,110,0.25)');
  jetGrad.addColorStop(0.5,  'rgba(255,230,170,0.18)');
  jetGrad.addColorStop(0.65, 'rgba(220,180,110,0.25)');
  jetGrad.addColorStop(0.85, 'rgba(160,120,70,0.12)');
  jetGrad.addColorStop(1,    'rgba(0,0,0,0)');

  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, cy, jetW, jetH, 0, 0, Math.PI * 2);
  ctx.fillStyle = jetGrad;
  ctx.fill();
  ctx.restore();

  // Нижняя яркая дуга (главный диск снизу — самая яркая часть Гаргантюа)
  for (let pass = 0; pass < 4; pass++) {
    const alpha = [0.9, 0.55, 0.3, 0.12][pass];
    const thick = [R * 0.28, R * 0.18, R * 0.12, R * 0.22][pass];
    const scaleY = [0.32, 0.3, 0.28, 0.35][pass];

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1, scaleY);

    const botGrad = ctx.createRadialGradient(0, 0, R * 0.85, 0, 0, R * 1.2);
    botGrad.addColorStop(0,   `rgba(255,250,230,${alpha})`);
    botGrad.addColorStop(0.35,`rgba(255,220,150,${alpha * 0.75})`);
    botGrad.addColorStop(0.7, `rgba(200,160,80,${alpha * 0.35})`);
    botGrad.addColorStop(1,   'rgba(0,0,0,0)');

    ctx.beginPath();
    ctx.arc(0, 0, R * 1.15, 0, Math.PI);
    ctx.lineWidth = thick;
    ctx.strokeStyle = botGrad;
    ctx.stroke();
    ctx.restore();
  }

  // Фотонное кольцо — тонкое яркое
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(1, 0.3);
  const photonGrad = ctx.createRadialGradient(0, 0, R * 0.92, 0, 0, R * 1.08);
  photonGrad.addColorStop(0,   'rgba(255,255,240,0.7)');
  photonGrad.addColorStop(0.5, 'rgba(255,240,200,0.4)');
  photonGrad.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI * 2);
  ctx.lineWidth = R * 0.06;
  ctx.strokeStyle = photonGrad;
  ctx.stroke();
  ctx.restore();

  // Горизонт событий — абсолютная тьма
  const hGrad = ctx.createRadialGradient(cx, cy - R*0.04, 0, cx, cy, R * 0.88);
  hGrad.addColorStop(0,    '#000000');
  hGrad.addColorStop(0.82, '#000000');
  hGrad.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.88, 0, Math.PI * 2);
  ctx.fillStyle = hGrad;
  ctx.fill();

  // === ПУЛЬС В ЦЕНТРЕ ===
  const ecgLen = R * 1.4;
  const ecgAmp = thinking
    ? R * 0.08 * (0.5 + Math.sin(t * 12) * 0.5)
    : R * 0.12;

  ecgPhase += thinking ? 0.18 : 0.055;

  // Маска — только внутри горизонта
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.72, 0, Math.PI * 2);
  ctx.clip();

  // Горизонтальная линия основания
  ctx.beginPath();
  ctx.moveTo(cx - ecgLen/2, cy);
  ctx.lineTo(cx + ecgLen/2, cy);
  ctx.strokeStyle = 'rgba(180,60,60,0.15)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Кардиограмма
  ctx.beginPath();
  for (let x = 0; x <= ecgLen; x += 1) {
    const fade = Math.sin((x / ecgLen) * Math.PI);
    const yVal = ecgY(x, ecgPhase, ecgAmp) * fade;
    const px = cx - ecgLen/2 + x;
    const py = cy - yVal * R;
    x === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }

  ctx.shadowBlur = thinking ? 20 : 10;
  ctx.shadowColor = thinking ? 'rgba(255,100,100,0.9)' : 'rgba(220,80,80,0.7)';
  ctx.strokeStyle = thinking ? 'rgba(255,120,120,0.95)' : 'rgba(200,60,60,0.85)';
  ctx.lineWidth = thinking ? 1.8 : 1.3;
  ctx.stroke();

  // Движущаяся точка на кардиограмме
  const dotX_norm = (ecgPhase * 0.3) % 1;
  const dotX = cx - ecgLen/2 + dotX_norm * ecgLen;
  const dotFade = Math.sin(dotX_norm * Math.PI);
  const dotY = cy - ecgY(dotX_norm * ecgLen, ecgPhase, ecgAmp) * dotFade * R;

  ctx.beginPath();
  ctx.arc(dotX, dotY, thinking ? 3 : 2, 0, Math.PI * 2);
  ctx.fillStyle = thinking ? 'rgba(255,200,100,1)' : 'rgba(255,160,80,0.9)';
  ctx.shadowBlur = 10;
  ctx.shadowColor = 'rgba(255,160,80,0.8)';
  ctx.fill();

  ctx.restore();

  t += 0.008;
  requestAnimationFrame(drawFrame);
}
drawFrame();

// Тап по центру
canvas.addEventListener('click', e => {
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  if (Math.sqrt(dx*dx + dy*dy) < R * 1.1) {
    setStatus('answer', 'Напиши вопрос Puls в чате — он ответит с учётом твоих данных');
    thinking = true;
    setTimeout(() => { thinking = false; }, 3000);
  }
});

function setStatus(type, text) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status ' + type;
}
</script>
</body>
</html>
