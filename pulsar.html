  cx = W / 2;
  cy = H / 2 - 60;
}
resize();

  particles = [];

    const angle = Math.random() * Math.PI * 2;
    const r = 90 + Math.random() * 120;
    const speed = (0.002 + Math.random() * 0.003) * (Math.random() > 0.5 ? 1 : -1);
    const brightness = 0.2 + Math.random() * 0.6;
    const size = 0.5 + Math.random() * 1.5;
    // Цвет: от золотого к синему-белому
    const hue = Math.random() > 0.6 ?

    + Math.sin(t2 * 2.7) * 0.1;
  return beat;
}

  bgGrad.addColorStop(0, '#05020f');
  bgGrad.addColorStop(1, '#000000');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Звёзды
  ctx.save();
  for (let i = 0; i < 80; i++) {
    const sx = (Math.sin(i * 127.3) * 0.5 + 0.5) * W;
    const sy = (Math.cos(i * 89.7) * 0.5 + 0.5) * H;
    const sr = 0.4 + Math.sin(i + t * 0.3) * 0.3;
    const sa = 0.2 + Math.sin(i * 3.1 + t * 0.5) * 0.15;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${sa})`;
    ctx.fill();
  }
  ctx.restore();

  // Внешнее диффузное свечение (линзирование)
  const outerGlow = ctx.createRadialGradient(cx, cy, 60, cx, cy, 260);

  outerGlow.addColorStop(0.3, 'rgba(100,60,200,0.06)');
  outerGlow.addColorStop(0.6, 'rgba(80,40,160,0.08)');
  outerGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = outerGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, 260, 0, Math.PI * 2);
  ctx.fill();

  // Аккреционный диск — эллипс с градиентом
  ctx.save();
  ctx.translate(cx, cy);

  // Нижняя часть диска (за горизонтом)
  for (let layer = 0; layer < 8; layer++) {
    const rInner = 72 + layer * 14;
    const rOuter = rInner + 16;
    const scaleY = 0.28 + layer * 0.01;
    const alpha = (0.35 - layer * 0.04) * pulseIntensity;

    const diskGrad = ctx.createRadialGradient(0, 0, rInner, 0, 0, rOuter);
    const hue = layer < 3 ? 40 + layer * 15 : 200 + layer * 8;
    diskGrad.addColorStop(0, `hsla(${hue},90%,75%,${alpha})`);
    diskGrad.addColorStop(1, `hsla(${hue},70%,30%,0)`);

    ctx.save();
    ctx.scale(1, scaleY);
    ctx.beginPath();
    ctx.arc(0, 0, rOuter, Math.PI, Math.PI * 2);
    ctx.fillStyle = diskGrad;
    ctx.fill();
    ctx.restore();
  }

    const py = Math.sin(p.angle) * p.r * 0.28;
    const alpha = p.brightness * 0.7 * pulseIntensity;
    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},80%,80%,${alpha})`;
    ctx.fill();
  });

  for (let layer = 0; layer < 8; layer++) {
    const rInner = 72 + layer * 14;
    const rOuter = rInner + 16;
    const scaleY = 0.3 + layer * 0.01;
    const alpha = (0.45 - layer * 0.05) * pulseIntensity;

    const hue = layer < 3 ? 35 + layer * 12 : 210 + layer * 6;
    diskGrad.addColorStop(0, `hsla(${hue},95%,85%,${alpha})`);
    diskGrad.addColorStop(1, `hsla(${hue},70%,30%,0)`);

    ctx.save();

    ctx.arc(0, 0, rOuter, 0, Math.PI);

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;
let t = 0;
let pulsePhase = 0;
let pulseIntensity = 1;
let isThinking = false;
let particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2 - 60;
}
resize();
window.addEventListener('resize', resize);

// Частицы диска
function initParticles() {
  particles = [];
  const count = 300;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 90 + Math.random() * 120;
    const speed = (0.002 + Math.random() * 0.003) * (Math.random() > 0.5 ? 1 : -1);
    const brightness = 0.2 + Math.random() * 0.6;
    const size = 0.5 + Math.random() * 1.5;
    // Цвет: от золотого к синему-белому
    const hue = Math.random() > 0.6 ? 
      Math.random() * 40 + 20 :   // тёплые
      Math.random() * 40 + 200;   // холодные
    particles.push({ angle, r, speed, brightness, size, hue });
  }
}
initParticles();

// ECG в центре
let ecgPoints = [];
let ecgOffset = 0;
function getECGY(x, phase) {
  const t2 = x * 0.08 + phase;
  const beat = Math.sin(t2 * 1.2) * 0.3
    + (Math.abs(Math.sin(t2 * 0.4)) > 0.85 ? Math.sin(t2 * 12) * 1.0 : 0)
    + Math.sin(t2 * 2.7) * 0.1;
  return beat;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Фон — глубокий космос
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.8);
  bgGrad.addColorStop(0, '#05020f');
  bgGrad.addColorStop(1, '#000000');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Звёзды
  ctx.save();
  for (let i = 0; i < 80; i++) {
    const sx = (Math.sin(i * 127.3) * 0.5 + 0.5) * W;
    const sy = (Math.cos(i * 89.7) * 0.5 + 0.5) * H;
    const sr = 0.4 + Math.sin(i + t * 0.3) * 0.3;
    const sa = 0.2 + Math.sin(i * 3.1 + t * 0.5) * 0.15;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${sa})`;
    ctx.fill();
  }
  ctx.restore();

  // Внешнее диффузное свечение (линзирование)
  const outerGlow = ctx.createRadialGradient(cx, cy, 60, cx, cy, 260);
  outerGlow.addColorStop(0, 'rgba(120,80,220,0.0)');
  outerGlow.addColorStop(0.3, 'rgba(100,60,200,0.06)');
  outerGlow.addColorStop(0.6, 'rgba(80,40,160,0.08)');
  outerGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = outerGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, 260, 0, Math.PI * 2);
  ctx.fill();

  // Аккреционный диск — эллипс с градиентом
  ctx.save();
  ctx.translate(cx, cy);

  // Нижняя часть диска (за горизонтом)
  for (let layer = 0; layer < 8; layer++) {
    const rInner = 72 + layer * 14;
    const rOuter = rInner + 16;
    const scaleY = 0.28 + layer * 0.01;
    const alpha = (0.35 - layer * 0.04) * pulseIntensity;

    const diskGrad = ctx.createRadialGradient(0, 0, rInner, 0, 0, rOuter);
    const hue = layer < 3 ? 40 + layer * 15 : 200 + layer * 8;
    diskGrad.addColorStop(0, `hsla(${hue},90%,75%,${alpha})`);
    diskGrad.addColorStop(1, `hsla(${hue},70%,30%,0)`);

    ctx.save();
    ctx.scale(1, scaleY);
    ctx.beginPath();
    ctx.arc(0, 0, rOuter, Math.PI, Math.PI * 2);
    ctx.fillStyle = diskGrad;
    ctx.fill();
    ctx.restore();
  }

  // Частицы диска
  particles.forEach(p => {
    p.angle += p.speed * (isThinking ? 2 : 1);
    const px = Math.cos(p.angle) * p.r;
    const py = Math.sin(p.angle) * p.r * 0.28;
    const alpha = p.brightness * 0.7 * pulseIntensity;
    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},80%,80%,${alpha})`;
    ctx.fill();
  });

  // Верхняя часть диска (перед горизонтом)
  for (let layer = 0; layer < 8; layer++) {
    const rInner = 72 + layer * 14;
    const rOuter = rInner + 16;
    const scaleY = 0.3 + layer * 0.01;
    const alpha = (0.45 - layer * 0.05) * pulseIntensity;

    const diskGrad = ctx.createRadialGradient(0, 0, rInner, 0, 0, rOuter);
    const hue = layer < 3 ? 35 + layer * 12 : 210 + layer * 6;
    diskGrad.addColorStop(0, `hsla(${hue},95%,85%,${alpha})`);
    diskGrad.addColorStop(1, `hsla(${hue},70%,30%,0)`);

    ctx.save();
    ctx.scale(1, scaleY);
    ctx.beginPath();
    ctx.arc(0, 0, rOuter, 0, Math.PI);
    ctx.fillStyle = diskGrad;
    ctx.fill();
    ctx.restore();
  }

  // Горизонт событий — абсолютная тьма
  const hGrad = ctx.createRadialGradient(0, -8, 0, 0, 0, 68);
  hGrad.addColorStop(0, 'rgba(0,0,0,1)');
  hGrad.addColorStop(0.75, 'rgba(0,0,0,1)');
  hGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(0, 0, 68, 0, Math.PI * 2);
  ctx.fillStyle = hGrad;
  ctx.fill();

  // Фотонное кольцо
  ctx.beginPath();
  ctx.ellipse(0, 0, 72, 20, 0, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,220,120,${0.35 * pulseIntensity})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ECG пульс в центре черной дыры
  const ecgW = 80;
  const ecgH = 22;
  const ecgAlpha = isThinking ? 0.3 + Math.sin(t * 8) * 0.3 : 0.7 + Math.sin(t * 3) * 0.2;

  ctx.save();
  // Маска — только внутри горизонта
  ctx.beginPath();
  ctx.arc(0, 0, 56, 0, Math.PI * 2);
  ctx.clip();

  ctx.beginPath();
  ctx.moveTo(-ecgW/2, 0);

  for (let x = 0; x <= ecgW; x++) {
    const nx = x / ecgW;
    const fade = Math.sin(nx * Math.PI);
    const yVal = getECGY(x, ecgOffset) * ecgH * fade;
    ctx.lineTo(-ecgW/2 + x, -yVal);
  }

  // Свечение ECG
  ctx.shadowBlur = 12;
  ctx.shadowColor = `rgba(200,160,255,0.8)`;
  ctx.strokeStyle = `rgba(220,180,255,${ecgAlpha})`;
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.restore();

  // Центральная точка пульса
  const dotGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, 18);
  dotGlow.addColorStop(0, `rgba(255,240,255,${0.6 * pulseIntensity})`);
  dotGlow.addColorStop(0.4, `rgba(180,120,255,${0.2 * pulseIntensity})`);
  dotGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(0, 0, 18, 0, Math.PI * 2);
  ctx.fillStyle = dotGlow;
  ctx.fill();

  ctx.restore();

  // Обновляем
  ecgOffset += isThinking ? 0.15 : 0.05;
  pulsePhase += 0.02;
  t += 0.01;

  // Дыхание диска
  pulseIntensity = 0.85 + Math.sin(t * 1.5) * 0.15;

  requestAnimationFrame(draw);
}
draw();

// Клик по центру
canvas.addEventListener('click', (e) => {
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  if (Math.sqrt(dx*dx + dy*dy) < 80) {
    document.getElementById('textInput').focus();
  }
});

// Состояния
function setState(state, text) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status' + (state === 'answer' ? ' answer' : '');
  isThinking = state === 'thinking';
}

// Отправка
function sendText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  askPulsar(text);
}

document.getElementById('textInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendText();
});

async function askPulsar(question) {
  setState('thinking', '...');
  const userId = tg.initDataUnsafe?.user?.id;
  try {
    tg.sendData(JSON.stringify({
      type: 'pulsar_question',
      question: question,
      user_id: userId
    }));
    setState('answer', 'Смотри ответ в чате');
  } catch (e) {
    setState('idle', 'Напиши вопрос боту напрямую');
  }
}
